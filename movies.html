<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies & Series — Shamsiddin</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23111'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' font-family='Arial, sans-serif' font-size='50' font-weight='bold' fill='%23fff'>SH</text></svg>">
    <link rel="stylesheet" href="assets/css/main.css?v=2">
    <link rel="stylesheet" href="assets/css/movies.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body style="background-color: #080808;">
    <header class="header" style="position: sticky; top: 0; background: rgba(8, 8, 8, 0.9); border-bottom: 1px solid #222;">
        <a href="index.html" class="logo"><i class="ri-arrow-left-line"></i> Back to Portfolio</a>
    </header>

    <main class="movies-container">
        <div class="movies-hero">
            <h1>Kino va Seriallar</h1>
            <p>Men tomosha qilgan va e'tiborga molik eng yaxshi ekran asarlari to'plami.</p>
        </div>

        <!-- Horizontal Navigator for Genres -->
        <div class="genres-navigator">
            <button class="genre-btn active" data-genre="all">All Movies</button>
            <div id="dynamic-genres" style="display: inline-flex; gap: 10px;">
                <!-- Genres will be injected here -->
            </div>
        </div>

        <div class="movies-grid" id="moviesGrid">
            <!-- Loading indicator -->
            <div style="grid-column: 1 / -1; text-align: center; padding: 50px; color: #888;">
                <i class="ri-loader-4-line" style="font-size: 40px; display: inline-block; animation: spin 1s linear infinite;"></i>
                <p style="margin-top: 15px;">Loading movies...</p>
            </div>
        </div>
        
        <div class="load-more-container" style="text-align: center; margin: 40px 0; display: none;" id="loadMoreContainer">
            <button class="btn" id="loadMoreBtn">Load More</button>
        </div>
    </main>

    <style>
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
    
    <script src="assets/js/movies.js?v=1"></script>
</body>
</html>
